apiVersion: v2
appVersion: "1.0"
description: A Helm chart for opal-user-service App
name: opal-user-service
home: https://github.com/hmcts/opal-user-service
version: 0.0.53
maintainers:
  - name: HMCTS opal team
dependencies:
  - name: java
    version: 5.3.0
    repository: 'oci://hmctsprod.azurecr.io/helm'
  - name: hmcts-redis
    version: 1.0.0
    repository: "oci://hmctsprod.azurecr.io/helm"
    condition: hmcts-redis.enabled
  - name: job
    alias: user-role-mapping-refresh
    version: 2.2.1
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: user-role-mapping-refresh.enabled
