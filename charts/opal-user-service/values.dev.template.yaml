java:
  # Don't modify below here
  image: ${IMAGE_NAME}
  ingressHost: ${SERVICE_FQDN}
  devmemoryRequests: "1Gi"
  devcpuRequests: "250m"
  devmemoryLimits: "2Gi"
  devcpuLimits: "2500m"
  keyVaults:
    opal:
      secrets:
        - name: app-insights-connection-string
          alias: app-insights-connection-string
        - name: launch-darkly-sdk-key
          alias: LAUNCH_DARKLY_SDK_KEY
        - name: AzureADTenantId
          alias: AAD_TENANT_ID
        - name: AzureADClientId
          alias: AAD_CLIENT_ID
        - name: AzureADClientSecret
          alias: AAD_CLIENT_SECRET
        - name: OpalTestUserPassword
          alias: OPAL_TEST_USER_PASSWORD
  environment:
    REDIS_CONNECTION_STRING: redis://${SERVICE_NAME}-hmcts-redis-master:6379
    OPAL_USER_DB_HOST: "{{ .Release.Name }}-postgresql"
    OPAL_USER_DB_NAME: "{{ .Values.postgresql.auth.database}}"
    OPAL_USER_DB_USERNAME: "{{ .Values.postgresql.auth.username}}"
    OPAL_USER_DB_PASSWORD: "{{ .Values.postgresql.auth.password}}"
    OPAL_USER_DB_OPTIONS: "?stringtype=unspecified"
    OPAL_USER_DB_PORT: 5432
    RUN_DB_MIGRATION_ON_STARTUP: true
    OPAL_FRONTEND_URL: https://opal-frontend.staging.apps.hmcts.net
    TESTING_SUPPORT_ENDPOINTS_ENABLED: true
    LAUNCH_DARKLY_ENABLED: false
  postgresql:
    enabled: true
hmcts-redis:
  enabled: true
  master:
    persistence:
      enabled: false
  auth:
    enabled: false
    sentinel: false
  image:
    registry: hmctsprod.azurecr.io
    repository: imported/redis
    tag: 8.2.1
  sentinel:
    enabled: false
  metrics:
    enabled: false
