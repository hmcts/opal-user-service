openapi: 3.1.1
info:
  description: Opal User Service - Common components
  license:
    name: MIT
    url: 'https://opensource.org/licenses/MIT'
  title: Opal Fines Service
  version: v0.0.1
components:
  headers:
    ETag:
      description: Version of the returned entity - a BigInteger surrounded by double quotes.
      schema:
        type: string
        example: '"7"'
      required: true
  schemas:
    BusinessUnitUser:
      type: object
      description: Represents user's access for a business unit. (placeholder structure)
      properties:
        business_unit_id:
          type: integer
          description: Business unit identifier.
        business_unit_name:
          type: string
          description: Human readable name of the business unit.
        roles:
          type: array
          items:
            type: string
            description: Roles the user has in this business unit.
    ProblemDetail:
      type: object
      required:
        - title
        - status
        - detail
      properties:
        type:
          type: string
          format: uri
          example: 'https://example.com/problem'
        title:
          type: string
          maxLength: 100
          example: Not Found
        status:
          type: integer
          format: int32
          example: 404
        detail:
          type: string
          example: The requested resource was not found.
        instance:
          type: string
          format: uri
          example: 'https://example.com/problem/12345'
        operation_id:
          type: string
          description: A unique operation id that links logs of the same operation together
          format: uuid
        retriable:
          type: boolean
        properties:
          type: object
          additionalProperties:
            type: string
